<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Collections — Saint Laurent</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:  #c9a560;
      --cream: #f5ede4;
      --muted: #9a7e70;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'Montserrat', Arial, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      font-family: var(--sans); font-weight: 300;
      overflow: hidden;
    }

    /* ── Full-screen background ── */
    .page {
      position: relative;
      width: 100vw; height: 100vh;
      background: url("https://f1m2wvuqxivimpbz.public.blob.vercel-storage.com/ysl-chatbot/Background.png") center center / cover no-repeat;
    }

    /* dark overlay for readability */
    .page::before {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(8,4,6,.52) 0%, transparent 30%),
        linear-gradient(to top,    rgba(8,4,6,.45) 0%, transparent 35%),
        linear-gradient(to right,  rgba(8,4,6,.35) 0%, transparent 60%);
    }

    /* ── Header ── */
    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      height: 64px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 38px;
      border-bottom: 1px solid rgba(201,165,96,.18);
      backdrop-filter: blur(10px);
      background: rgba(8,4,6,.45);
    }
    .logo {
      font-family: var(--serif); font-size: 20px; font-weight: 400;
      letter-spacing: .44em; text-transform: uppercase;
      color: var(--cream); text-decoration: none;
    }

    /* ── Bottom content ── */
    .content {
      position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: flex-start;
      padding: 0 60px 64px;
    }
    .eyebrow {
      font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .headline {
      font-family: var(--serif); font-size: clamp(56px, 8vw, 96px);
      font-weight: 300; font-style: italic; line-height: 1.05;
      color: var(--cream); margin-bottom: 24px;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      margin-bottom: 24px;
    }
    .sub {
      font-size: 11px; letter-spacing: .12em; line-height: 1.9;
      color: rgba(245,237,228,.6); max-width: 340px; margin-bottom: 36px;
    }
    .cta-video {
      width: 300px;
      height: 373px;
      border: 4px solid #1a1a1a;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      box-shadow: 0 16px 60px rgba(0,0,0,.55);
      text-decoration: none;
      display: block;
    }
    .cta-video video,
    .cta-video .cover {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .cta-video .cover {
      transition: opacity .45s ease;
      z-index: 2;
    }
    .cta-video:hover .cover { opacity: 0; }
    .cta-video video { z-index: 1; }
    .cta-video-label {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      padding: 18px 24px;
      background: linear-gradient(to top, rgba(8,4,6,.72), transparent);
      font-size: 9px; letter-spacing: .26em; text-transform: uppercase;
      color: var(--cream);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* sparkle watermark */
    .sparkle {
      position: absolute; bottom: 28px; right: 44px; z-index: 6;
      opacity: .3;
    }
  </style>
</head>
<body>

<div class="page">

  <header>
    <a class="logo" href="https://www.ysl.com" target="_blank" rel="noopener">Saint&nbsp;Laurent</a>
  </header>

  <div class="content">
    <p class="eyebrow">SS 2026</p>
    <h1 class="headline">All<br/>Collections</h1>
    <div class="divider"></div>
    <p class="sub">A universe of desire — explore every chapter<br/>of the Saint Laurent story.</p>
    <a class="cta-video" href="valentine.html" id="access-card">
      <video src="https://f1m2wvuqxivimpbz.public.blob.vercel-storage.com/ysl-chatbot/Video.mp4" muted loop playsinline id="access-video"></video>
      <img class="cover" src="https://f1m2wvuqxivimpbz.public.blob.vercel-storage.com/ysl-chatbot/Qixi_Access.png" alt="Qi Xi Access" />
      <span class="cta-video-label">
        <span>Qi Xi Valentine's 2026</span>
        <span>→</span>
      </span>
    </a>

    <script>
      var card  = document.getElementById('access-card');
      var video = document.getElementById('access-video');
      card.addEventListener('mouseenter', function () { video.play(); });
      card.addEventListener('mouseleave', function () { video.pause(); video.currentTime = 0; });
    </script>
  </div>

  <svg class="sparkle" width="40" height="40" viewBox="0 0 24 24" fill="white">
    <path d="M12 2 L13.09 8.26 L19 6 L14.74 10.91 L21 12 L14.74 13.09 L19 18 L13.09 15.74 L12 22 L10.91 15.74 L5 18 L9.26 13.09 L3 12 L9.26 10.91 L5 6 L10.91 8.26 Z"/>
  </svg>

</div>

</body>
</html>
